<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Employee Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #2c3e50;
}

/* Profile Section */
.profile {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
}

.profile-pic {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: url('https://via.placeholder.com/100') no-repeat center/cover;
    border: 3px solid #3498db;
}

.profile-info {
    flex: 1;
}

/* Form Grid */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 14px;
    margin-bottom: 5px;
    color: #555;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* Full width fields */
.full {
    grid-column: span 2;
}

/* Button */
.btn {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    border: none;
    background: #3498db;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background: #2980b9;
}
</style>
</head>

<body>


<div class="container">

    <h2>Bank Employee Details</h2>
    <form action="register" method="post">

    <!-- Profile -->
    <div class="profile">
        <div class="profile-pic"></div>
        <div class="profile-info">
            <h3>Darshan Narjinari</h3>
            <p>Branch Manager</p>
        </div>
    </div>

    <!-- Form -->
    <div class="form-grid">

        <!-- 1 Employee ID -->
        <div class="form-group">
            <label>Employee Id  </label>
            <input type="text"
            id = "empid" placeholder="EMP001" name="empid" required>
        </div>

        <!-- 2 Full Name -->
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id = "empname" placeholder="Enter Name" name ="empname" required > 
        </div>

        <!-- 3 Email -->
        <div class="form-group">
            <label>Email</label>
            <input type="email" id = "email" placeholder="Enter Email" name = "email" required>
        </div>

        <!-- 4 Phone -->
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="MobNo" placeholder="Enter Phone Number" name = "MobNo" required>
        </div>

        <!-- 5 Gender -->
        <div class="form-group">
            <label>Gender</label>
            <input type="text" id="Gender" placeholder="Male/Female" name="Gender" required>
        </div>

        <!-- 6 Date of Birth --
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date">>
        </div>

        <!-- 7 Address -->
        <div class="form-group full">
            <label>Address</label>
            <input type="text" id="Address" placeholder="Enter Address" name="Address" required>
        </div>

        <!-- 8 Department -->
        <div class="form-group">
            <label>Department</label>
            <input type="text" id = "DEPT" placeholder="Loans / Accounts" name ="DEPT" required >
        </div>

        <!-- 9 Designation -->
        <div class="form-group">
            <label>Designation</label>
            <input type="text" id = "Position" placeholder="Manager / Clerk" name ="Position" required>
        </div>

        <!-- 10 Salary -->
        <div class="form-group">
            <label>Salary</label>
            <input type="number" id = "salary" placeholder="Enter Salary" name = "salary" required>
        </div>

        <!-- 11 Experience -->
        <div class="form-group">
            <label>Experience (Years)</label>
            <input type="number" id = "Exp" placeholder="5" name = "Exp" required>
        </div>

        <!-- 12 Branch Name -->
        <div class="form-group">
            <label>Branch Name</label>
            <input type="text" id="branch" placeholder="Aurangabad Branch" name="branch" required>
        </div>

        <!-- 13 IFSC Code -->
        <div class="form-group">
            <label>IFSC Code</label>
            <input type="text" id = "ifsc" placeholder="SBIN0001234" name = "ifsc" required>
        </div>

        <!-- 14 Account Number -->
        <div class="form-group">
            <label>Account Number</label>
            <input type="text" id ="AcNum" placeholder="Enter Account Number" name = "AcNum" required>
        </div>

        <!-- 15 Joining Date --
        <div class="form-group">
            <label>Joining Date</label>
            <input type="date">
        </div>>

    </div>

    <!-- Button -->
    <button type="submit" class="btn">Save Employee</button>

</div>

</body>
</html>
